<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Clock and Details - Portal</title>
    <style>
        :root {
            --bg-color: #292A33;
            --btn-bg: #009285;
            --text-color: #e0e0e0;
            --btn-hover: #00bfa5;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* 標題樣式 */
        h1 {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 50px;
            color: #ffffff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* 按鈕容器：實現 左-中-右 的橫向排列 */
        .button-container {
            display: flex;
            gap: 30px; /* 按鈕之間的間距 */
            justify-content: center;
            align-items: center;
            width: 90%;
            max-width: 1000px;
        }

        /* 連結按鈕基礎樣式（與時鐘風格呼應） */
        .portal-btn {
            flex: 1; /* 讓三個按鈕平分寬度 */
            text-decoration: none;
            background-color: var(--btn-bg);
            color: #ffffff;
            font-size: 24px;
            font-weight: 500;
            padding: 40px 20px;
            text-align: center;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 120px;
        }

        /* 副標題樣式（按鈕內的英文或小字） */
        .portal-btn span {
            font-size: 16px;
            margin-top: 8px;
            color: #b2dfdb;
            font-weight: normal;
        }

        /* 滑鼠懸停效果：亮起並輕微浮起 */
        .portal-btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        /* 響應式設計：如果手機直向瀏覽，會自動轉為上下排列 */
        @media (max-width: 768px) {
            .button-container {
                flex-direction: column;
                gap: 20px;
            }
            .portal-btn {
                width: 100%;
                padding: 25px 20px;
            }
            h1 {
                font-size: 32px;
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <h1>考試時鐘及資料<br>Exam Clock and Details</h1>

    <div class="button-container">
        
        <a href="clockC.html" class="portal-btn">
            中文版
        </a>

        <a href="clockE.html" class="portal-btn">
            English Version
        </a>

        <a href="clockCE.html" class="portal-btn">
            中文 & English
        </a>

    </div>

</body>
</html>
