<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考試時鐘及資料</title>
    <style>
        :root {
            --bg-color: #292A33;
            --clock-bg: #009285;
            --text-color: #e0e0e0;
            --accent-color: #4caf50;
            --modal-bg: #252525;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 1. 數字時鐘（在上） */
        #clock {
            font-size: 110px;
            font-weight: bold;
            font-family: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, Courier, monospace; 
            letter-spacing: 2px;
            background-color: var(--clock-bg);
            color: #ffffff;
            padding: 15px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        /* 2. 考試資料資訊欄（在下） */
        #info-container {
            font-size: 32px; 
            line-height: 1.8;
            max-width: 80%;
            
            display: grid;
            grid-template-columns: auto auto; 
            column-gap: 20px; 
            justify-content: center; 
        }

        .info-label {
            text-align: left;
            color: #d1d2d6;
        }

        .info-value {
            text-align: left;
            font-weight: bold;
            color: var(--text-color);
        }

        /* 右下角圖片區域 */
        #image-area {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #image-area img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 左下角控制區域 (修改 + 縮放按鈕) */
        .controls-wrapper {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 5px; 
            align-items: center;
        }

        .low-profile-btn {
            background: transparent;
            border: 1px solid #4e4f5a;
            color: #6e6f7a;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.3s;
            user-select: none; 
        }
        .low-profile-btn:hover {
            color: var(--text-color);
            border-color: var(--text-color);
            background: rgba(255,255,255,0.05);
        }
        
        .zoom-btn {
            font-weight: bold;
            padding: 5px 8px;
        }

        /* 設定視窗 (Modal) */
        #config-modal {
            display: flex; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--modal-bg);
            padding: 30px;
            border-radius: 8px;
            width: 480px; /* 稍微加寬以容納較長的科目名稱 */
            max-width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-top: 0;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .form-group input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
            flex-shrink: 0;
        }

        .form-group label {
            flex: 1;
            font-size: 16px;
            white-space: nowrap;
        }

        .form-control {
            width: 60%;
            padding: 6px;
            background: #1a1a1a;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>

    <div id="info-container"></div>

    <div id="image-area">
        <img src="school.png" alt="學校標誌">
    </div>

    <div class="controls-wrapper">
        <button id="edit-btn" class="low-profile-btn" onclick="openModal()">修改資料</button>
        <button class="low-profile-btn zoom-btn" onclick="adjustFontSize(2)" title="放大資料字體">+</button>
        <button class="low-profile-btn zoom-btn" onclick="adjustFontSize(-2)" title="縮小資料字體">-</button>
    </div>

    <div id="config-modal">
        <div class="modal-content">
            <h3>考試頁面設定</h3>
            
            <div class="form-group">
                <input type="checkbox" id="chk-center-id">
                <label for="chk-center-id">試場編號：</label>
                <input type="text" id="val-center-id" class="form-control" value="J1450">
            </div>

            <div class="form-group">
                <input type="checkbox" id="chk-center-name">
                <label for="chk-center-name">試場名稱：</label>
                <input type="text" id="val-center-name" class="form-control" value="香港布廠商會朱石麟中學">
            </div>

            <div class="form-group">
                <input type="checkbox" id="chk-subject" checked>
                <label for="chk-subject">科目：</label>
                <select id="val-subject" class="form-control" onchange="checkSubjectCustom(this)">
                    <option value="中國語文">中國語文</option>
                    <option value="數學">數學</option>
                    <option value="數學 必修部分">數學 必修部分</option>
                    <option value="公民與社會發展科">公民與社會發展科</option>
                    <option value="科學">科學</option>
                    <option value="公民、經濟與社會">公民、經濟與社會</option>
                    <option value="地理">地理</option>
                    <option value="歷史">歷史</option>
                    <option value="綜合人文">綜合人文</option>
                    <option value="中國歷史">中國歷史</option>
                    <option value="視覺藝術">視覺藝術</option>
                    <option value="普通話">普通話</option>
                    <option value="生物">生物</option>
                    <option value="化學">化學</option>
                    <option value="物理">物理</option>
                    <option value="數學 延伸部分 單元二 (代數與微積分)">數學 延伸部分 單元二 (代數與微積分)</option>
                    <option value="經濟">經濟</option>
                    <option value="旅遊與款待">旅遊與款待</option>
                    <option value="資訊及通訊科技">資訊及通訊科技</option>
                    <option value="企業、會計與財務概論">企業、會計與財務概論</option>
                    <option value="健康管理與社會關懷">健康管理與社會關懷</option>
                    <option value="體育">體育</option>
                    <option value="CUSTOM">自訂...</option>
                </select>
            </div>

            <div class="form-group">
                <input type="checkbox" id="chk-paper">
                <label for="chk-paper">卷別：</label>
                <input type="text" id="val-paper" class="form-control" value="I">
            </div>

            <div class="form-group">
                <input type="checkbox" id="chk-lang">
                <label for="chk-lang">應考語文：</label>
                <input type="text" id="val-lang" class="form-control" value="中文">
            </div>

            <div class="form-group">
                <input type="checkbox" id="chk-module">
                <label for="chk-module">選修單元：</label>
                <input type="text" id="val-module" class="form-control" value="">
            </div>

            <div class="form-group">
                <input type="checkbox" id="chk-time" checked>
                <label for="chk-time">考試時間：</label>
                <input type="text" id="val-time" class="form-control" value="08:25 - ">
            </div>

            <button class="btn-submit" onclick="applySettings()">確認並應用</button>
        </div>
    </div>

    <script>
        let currentFontSize = 32;

        // 1. 實時時鐘功能 (24小時制)
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 處理「自訂」科目彈出視窗
        let customSubjectValue = "";
        function checkSubjectCustom(selectElement) {
            if (selectElement.value === "CUSTOM") {
                const customInput = prompt("請輸入自訂科目名稱：");
                if (customInput && customInput.trim() !== "") {
                    customSubjectValue = customInput.trim();
                    let customOpt = selectElement.querySelector('option[data-custom="true"]');
                    if (!customOpt) {
                        customOpt = document.createElement('option');
                        customOpt.setAttribute('data-custom', 'true');
                        selectElement.insertBefore(customOpt, selectElement.lastElementChild);
                    }
                    customOpt.value = customSubjectValue;
                    customOpt.textContent = customSubjectValue;
                    selectElement.value = customSubjectValue;
                } else {
                    selectElement.selectedIndex = 0;
                }
            }
        }

        // 3. 應用設定並更新頁面內容
        function applySettings() {
            const container = document.getElementById('info-container');
            container.innerHTML = ''; 

            const fields = [
                { chk: 'chk-center-id', val: 'val-center-id', label: '試場編號' },
                { chk: 'chk-center-name', val: 'val-center-name', label: '試場名稱' },
                { chk: 'chk-subject', val: 'val-subject', label: '科目' },
                { chk: 'chk-paper', val: 'val-paper', label: '卷別' },
                { chk: 'chk-lang', val: 'val-lang', label: '應考語文' },
                { chk: 'chk-module', val: 'val-module', label: '選修單元' },
                { chk: 'chk-time', val: 'val-time', label: '考試時間' }
            ];

            fields.forEach(field => {
                const isChecked = document.getElementById(field.chk).checked;
                if (isChecked) {
                    const value = document.getElementById(field.val).value;
                    if (value.trim() !== "") {
                        const labelDiv = document.createElement('div');
                        labelDiv.className = 'info-label';
                        labelDiv.textContent = `${field.label}：`;

                        const valueDiv = document.createElement('div');
                        valueDiv.className = 'info-value';
                        valueDiv.textContent = value;

                        container.appendChild(labelDiv);
                        container.appendChild(valueDiv);
                    }
                }
            });

            document.getElementById('config-modal').style.display = 'none';
        }

        // 4. 開啟修改視窗
        function openModal() {
            document.getElementById('config-modal').style.display = 'flex';
        }

        // 5. 放大/縮小考試資料字體功能
        function adjustFontSize(modifier) {
            currentFontSize += modifier;
            if (currentFontSize < 16) currentFontSize = 16;
            if (currentFontSize > 80) currentFontSize = 80;
            document.getElementById('info-container').style.fontSize = currentFontSize + 'px';
        }
    </script>
</body>
</html>
